version: "3.9"

services:
  fastapi-health:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9999:8000"
    environment:
      # Set your OpenAI key here or export in the shell before running docker compose.
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    # Uncomment to mount local code for live editing
    # volumes:
    #   - .:/app
