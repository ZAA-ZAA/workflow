version: "3.9"

services:
  fastapi-health:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9999:8000"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
