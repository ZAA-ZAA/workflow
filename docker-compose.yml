version: "3.9"

services:
  fastapi-health:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9999:8000"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    # Uncomment to mount local code for live editing
    # volumes:
    #   - .:/app
    # Optional: mount Gmail OAuth credentials for /email-task/gmail/poll
    #   - ./credentials.json:/app/credentials.json:ro
    #   - ./data:/app/data
